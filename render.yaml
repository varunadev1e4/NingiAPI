services:
  - type: web
    name: ningi-server
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ningi-db
          property: connectionString

databases:
  - name: ningi-db
    plan: free
    databaseName: ningi
    user: ningi
